<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <h1 class="game-logo">MEMORY MATCH</h1>
            <select id="lang-select" onchange="changeLang()" class="lang-dropdown">
                <option value="vi">🇻🇳 Tiếng Việt</option>
                <option value="en">🇬🇧 English</option>
            </select>
        </div>

        <div id="auth-screen" class="panel">
            <h2 id="t-login-title" class="panel-title">Đăng Nhập / Đăng Ký</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Tên tài khoản" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mật khẩu">
            </div>
            <div class="action-buttons">
                <button onclick="authenticate('login')" id="t-btn-login" class="btn btn-primary">Đăng nhập</button>
                <button onclick="authenticate('register')" id="t-btn-reg" class="btn btn-success">Đăng ký</button>
            </div>
            <p id="auth-msg" class="msg-text"></p>
        </div>

        <div id="menu-screen" class="panel hidden">
            <h2 id="welcome-msg" class="panel-title"></h2>
            
            <div class="menu-layout">
                <div class="settings-box">
                    <h3 id="t-settings" class="sub-title">Cài đặt trò chơi</h3>
                    <select id="difficulty" class="custom-select">
                        <option value="4">Màn 1 - Rất dễ (2 cặp)</option>
                        <option value="6">Màn 2 - Dễ (3 cặp)</option>
                        <option value="8">Màn 3 - Dễ+ (4 cặp)</option>
                        <option value="10">Màn 4 - Trung bình nhẹ (5 cặp)</option>
                        <option value="12">Màn 5 - Trung bình (6 cặp)</option>
                        <option value="16">Màn 6 - 4x4 (8 cặp)</option>
                        <option value="20">Màn 7 - Khó nhẹ (10 cặp)</option>
                        <option value="24">Màn 8 - Khó (12 cặp)</option>
                        <option value="30">Màn 9 - Rất khó (15 cặp)</option>
                        <option value="40">Màn 10 - Siêu khó (20 cặp)</option>
                    </select>
                    <select id="mode" class="custom-select">
                        <option value="1">1 Người chơi</option>
                        <option value="2">2 Người chơi (Chơi chung máy)</option>
                    </select>
                    <button onclick="startGame()" id="t-btn-start" class="btn btn-start">Bắt đầu Game</button>
                    <button id="btn-logout" onclick="logout()" class="btn btn-danger" style="margin-top: 15px; width: 100%;">Đăng xuất</button>
                </div>
                
                <div class="leaderboard-box">
                    <h3 class="sub-title">🏆 Bảng xếp hạng</h3>
                    <ul id="leaderboard-list">
                        <li><span>#1 Siêu Cấp Vô Địch</span> <strong>999 pts</strong></li>
                    </ul>
                </div>
            </div>
        </div>

        <div id="game-screen" class="panel hidden">
            <div class="stats-board">
                <div class="stat-item timer">
                    ⏱: <span id="time-left">60</span>s
                </div>
                <div class="stat-item combo">
                    <span id="combo-display">Game On!</span>
                </div>
                <div class="score-board">
                    <span id="p1-score" class="player-score player-active">P1: <span id="score1">0</span></span>
                    <span id="p2-score" class="player-score hidden">P2: <span id="score2">0</span></span>
                </div>
            </div>
            
            <div id="game-board"></div>
            
            <div class="game-actions">
                <button onclick="quitGame()" id="t-btn-quit" class="btn btn-danger">Thoát / Đầu hàng</button>
            </div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH NGÔN NGỮ ---
        const i18n = {
            vi: {
                loginTitle: "Đăng Nhập / Đăng Ký", btnLogin: "Đăng nhập", btnReg: "Đăng ký",
                settings: "Cài đặt trò chơi", btnStart: "Bắt đầu Game", btnQuit: "Thoát / Đầu hàng",
                win1: "Bạn đã thắng!", win2: "Người chơi 1 Thắng!", win3: "Người chơi 2 Thắng!", draw: "Hòa nhau!",
                timeOut: "Hết giờ! Bạn đã thua.", errAuth: "Vui lòng nhập đủ thông tin"
            },
            en: {
                loginTitle: "Login / Register", btnLogin: "Login", btnReg: "Register",
                settings: "Game Settings", btnStart: "Start Game", btnQuit: "Surrender",
                win1: "You Won!", win2: "Player 1 Wins!", win3: "Player 2 Wins!", draw: "It's a Draw!",
                timeOut: "Time's up! You lost.", errAuth: "Please enter all fields"
            }
        };
        let lang = 'vi';
        let currentUser = '';

        // --- TRẠNG THÁI GAME ---
        // Bổ sung thêm đủ 20 Emojis để đáp ứng đủ 40 thẻ (20 cặp) cho Màn 10
        const emojis = ['🍎','🍌','🍉','🍇','🍓','🍒','🍍','🥝','🥑','🌽','🥕','🍕','🍔','🍟','🌭','🍿','🍩','🍰','🧊','🚀'];
        let cards = [], hasFlippedCard = false, lockBoard = false;
        let firstCard, secondCard;
        let timer, timeLeft, matchesFound, totalPairs;
        let isMultiplayer, currentPlayer, scores = [0, 0];

        // --- XỬ LÝ GIAO DIỆN & TÀI KHOẢN (OFFLINE) ---
        function changeLang() {
            lang = document.getElementById('lang-select').value;
            document.getElementById('t-login-title').innerText = i18n[lang].loginTitle;
            document.getElementById('t-btn-login').innerText = i18n[lang].btnLogin;
            document.getElementById('t-btn-reg').innerText = i18n[lang].btnReg;
            document.getElementById('t-settings').innerText = i18n[lang].settings;
            document.getElementById('t-btn-start').innerText = i18n[lang].btnStart;
            document.getElementById('t-btn-quit').innerText = i18n[lang].btnQuit;
        }

        function authenticate(action) {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const msgBox = document.getElementById('auth-msg');

            if (!u || !p) { msgBox.innerText = i18n[lang].errAuth; return; }

            const userKey = 'MemoryGame_' + u;

            if (action === 'register') {
                if (localStorage.getItem(userKey)) {
                    msgBox.innerText = "Tài khoản đã tồn tại! Vui lòng đăng nhập.";
                } else {
                    localStorage.setItem(userKey, p);
                    msgBox.innerText = "Đăng ký thành công! Hãy bấm Đăng nhập.";
                }
            } else if (action === 'login') {
                const savedPass = localStorage.getItem(userKey);
                if (savedPass === p) {
                    currentUser = u;
                    msgBox.innerText = "";
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('menu-screen').classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = `Xin chào, ${currentUser}!`;
                } else {
                    msgBox.innerText = "Sai tài khoản hoặc mật khẩu!";
                }
            }
        }

        function logout() {
            currentUser = '';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
        }

        // --- LOGIC GAME CHÍNH ---
        function startGame() {
            const difficulty = parseInt(document.getElementById('difficulty').value);
            isMultiplayer = document.getElementById('mode').value === '2';
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            totalPairs = difficulty / 2;
            
            // Tính toán thời gian dựa trên độ khó để game hấp dẫn hơn
            if (difficulty <= 8) timeLeft = 45;
            else if (difficulty <= 16) timeLeft = 90;
            else if (difficulty <= 24) timeLeft = 130;
            else timeLeft = 210;

            matchesFound = 0;
            scores = [0, 0];
            currentPlayer = 1;
            
            updateScoreUI();
            
            // Xử lý bật/tắt hiển thị điểm P2 mượt mà hơn
            if (isMultiplayer) document.getElementById('p2-score').classList.remove('hidden');
            else document.getElementById('p2-score').classList.add('hidden');

            setupBoard(difficulty);
            startTimer();
        }

        function setupBoard(numCards) {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            // Tự động điều chỉnh số cột để thẻ bài luôn được xếp căn giữa, đẹp mắt
            let cols = 4;
            if (numCards <= 6) cols = 3;
            else if (numCards <= 16) cols = 4;
            else if (numCards <= 20) cols = 5;
            else if (numCards <= 30) cols = 6;
            else cols = 8;
            
            board.style.gridTemplateColumns = `repeat(${cols}, 70px)`;
            
            let gameEmojis = emojis.slice(0, numCards / 2);
            let deck = [...gameEmojis, ...gameEmojis];
            deck.sort(() => Math.random() - 0.5);

            deck.forEach(emoji => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.val = emoji;
                // Tạo cấu trúc thẻ lật 3D
                card.innerHTML = `<div class="card-front"></div><div class="card-back">${emoji}</div>`;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }
            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.val === secondCard.dataset.val;

            if (isMatch) {
                disableCards();
                scores[currentPlayer - 1]++;
                matchesFound++;
                updateScoreUI();
                
                if (matchesFound === totalPairs) {
                    clearInterval(timer);
                    setTimeout(declareWinner, 500);
                }
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            // Thêm hiệu ứng matched để thẻ nhấp nháy khi ăn điểm
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                
                if (isMultiplayer) {
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    updateScoreUI();
                }
                resetBoard();
            }, 800); // 800ms để nhịp game mượt và nhanh hơn
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function updateScoreUI() {
            document.getElementById('score1').innerText = scores[0];
            document.getElementById('score2').innerText = scores[1];
            
            if (isMultiplayer) {
                document.getElementById('p1-score').classList.toggle('player-active', currentPlayer === 1);
                document.getElementById('p2-score').classList.toggle('player-active', currentPlayer === 2);
            }
        }

        function startTimer() {
            document.getElementById('time-left').innerText = timeLeft;
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    lockBoard = true;
                    alert(i18n[lang].timeOut);
                    quitGame();
                }
            }, 1000);
        }

        function declareWinner() {
            if (!isMultiplayer) {
                alert(i18n[lang].win1);
            } else {
                if (scores[0] > scores[1]) alert(i18n[lang].win2);
                else if (scores[1] > scores[0]) alert(i18n[lang].win3);
                else alert(i18n[lang].draw);
            }
            quitGame();
        }

        function quitGame() {
            clearInterval(timer);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
